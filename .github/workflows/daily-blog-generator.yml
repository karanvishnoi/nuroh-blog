name: Daily Blog Generator

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      - name: Generate daily blogs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-daily-blogs.ts

      - name: Commit new posts
        run: |
          git config user.name "Nuroh Blog Bot"
          git config user.email "bot@nuroh.in"
          git add content/ logs/
          git diff --staged --quiet || git commit -m "📝 Auto-generated daily blog posts — $(date '+%Y-%m-%d')"
          git push

      - name: Trigger Vercel Deploy
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -s -X POST "$VERCEL_DEPLOY_HOOK_URL"

      - name: Summary
        run: |
          echo "## 📝 Daily Blog Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "**Posts generated:** $(ls content/blogs/$(date '+%Y-%m-%d')/*.mdx 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
